# PM2 log rotation — H2H Arbitrage
# 7-day retention, 10MB max per rotated file
# Installed: sudo cp /home/scott/h2h-arbitrage/scripts/logrotate.conf /etc/logrotate.d/h2h-pm2

/home/scott/.pm2/logs/h2h-arbitrage*.log
/home/scott/.pm2/logs/h2h-poller*.log {
    rotate 7
    weekly
    maxsize 10M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    su scott scott
}
